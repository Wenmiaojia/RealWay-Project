ktorClientWebsockets = "1.6.4"
lifecycleAndroidVersion = "0.1.12"
lifecycleRuntimeKtx = "2.6.1"
activityCompose = "1.8.0"
composeBom = "2024.04.01"
messageAdapterGson = "0.1.12"
messageAdapterMoshiVersion = "0.1.12"
moshi = "1.9.3"
retrofit = "2.9.0"
scarletStreamAdapterCoroutines = "0.1.2"
